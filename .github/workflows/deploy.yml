name: 'Deploy'

on:
  workflow_run:
    workflows: ['Tests']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: 'Deploy to server'
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Generate .env
        run: |
          cat > .env <<EOF
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          EOF

      - name: Sync sources to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            -e "ssh -p ${{ secrets.SSH_PORT || 22 }}" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Build & deploy on server
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e; \
             cd '${{ secrets.DEPLOY_PATH }}'; \
             docker compose pull --ignore-pull-failures || true; \
             docker compose up -d --build --remove-orphans; \
             docker image prune -f"

      - name: Health check
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && docker compose ps"
