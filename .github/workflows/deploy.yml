name: 'Deploy'

on:
  workflow_run:
    workflows: ['Tests']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: 'Deploy to server'
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout (sanity check only)
        uses: actions/checkout@v5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Generate .env
        run: |
          cat > .env <<EOF
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          EOF

      - name: Upload .env to server
        run: |
          scp -P "${{ secrets.SSH_PORT || 22 }}" \
            .env \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/.env"

      - name: Pull & rebuild on server
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e; \
             cd '${{ secrets.DEPLOY_PATH }}'; \
             git fetch --all --prune; \
             git reset --hard origin/main; \
             git submodule sync --recursive; \
             git submodule update --init --recursive --remote; \
             docker compose pull --ignore-pull-failures || true; \
             docker compose up -d --build --remove-orphans; \
             docker image prune -f"

      - name: Health check
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && docker compose ps"
